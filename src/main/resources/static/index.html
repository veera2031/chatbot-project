<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        overflow: hidden;
    }

    /* PARTICLES BACKGROUND */
    .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -1;
    }

    .particles span {
        position: absolute;
        display: block;
        width: 6px;
        height: 6px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        animation: move 12s linear infinite;
        bottom: -150px;
    }

    @keyframes move {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-1000px) scale(0.3); opacity: 0; }
    }

    header {
        padding: 15px;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    #chatBox {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .msg {
        padding: 12px 14px;
        border-radius: 15px;
        max-width: 70%;
        white-space: pre-wrap;
        font-size: 14px;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .user {
        align-self: flex-end;
        background: rgba(0, 0, 0, 0.25);
    }

    .bot {
        align-self: flex-start;
    }

    #inputArea {
        display: flex;
        padding: 12px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255,255,255,0.2);
    }

    input {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        outline: none;
        font-size: 14px;

        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    input::placeholder {
        color: rgba(255,255,255,0.7);
    }

    button {
        margin-left: 10px;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;

        background: rgba(255, 255, 255, 0.25);
        color: white;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        background: rgba(255, 255, 255, 0.35);
    }

    /* Typing animation */
    .typing {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 10px 14px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.2);
    }

    .dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: bounce 1.3s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
    }
</style>
</head>

<body>

<!-- PARTICLES -->
<div class="particles"></div>

<header>AI Chatbot 🤖</header>

<div id="chatBox"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
</div>

<script>
const chatBox = document.getElementById("chatBox");
const msg = document.getElementById("msg");

/* ADD MESSAGE */
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* TYPING */
function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";

    div.innerHTML = `
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

/* STREAM RESPONSE */
function streamMessage(text, element, speed = 30) {
    element.innerText = "";

    const words = text.split(" ");
    let i = 0;

    function addWord() {
        if (i < words.length) {
            element.innerText += words[i] + " ";
            i++;
            chatBox.scrollTop = chatBox.scrollHeight;
            setTimeout(addWord, speed);
        }
    }

    addWord();
}

/* SEND */
async function send() {
    const text = msg.value;
    if (!text) return;

    addMessage(text, "user");
    msg.value = "";

    showTyping();

    try {
       const res = await fetch("http://localhost:8080/chat", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        message: text
    })
});

        if (!res.ok) {
    throw new Error("HTTP Error: " + res.status);
}

const data = await res.json();

        removeTyping();

        const botDiv = document.createElement("div");
        botDiv.className = "msg bot";
        chatBox.appendChild(botDiv);

        streamMessage(data.reply, botDiv, 30);

    } catch (err) {
        removeTyping();
        addMessage("Server error ❌", "bot");
        console.log(err);
    }
}

/* ENTER KEY */
msg.addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});

/* PARTICLES */
function createParticles() {
    const container = document.querySelector(".particles");

    for (let i = 0; i < 30; i++) {
        const span = document.createElement("span");

        span.style.left = Math.random() * 100 + "vw";
        span.style.animationDuration = (5 + Math.random() * 10) + "s";
        span.style.opacity = Math.random();

        container.appendChild(span);
    }
}

createParticles();
</script>

</body>
</html>
